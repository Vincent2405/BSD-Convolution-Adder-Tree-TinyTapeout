# Tiny Tapeout project information
project:
  title:        "BSD Convolution Adder Tree"      # Project title
  author:       "Vincent Mertens"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Multiplierless shift-add tree for image convolution"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Vincent2405_adder_tree"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "TinyTapeoutAdderTree2.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "input value bit 0"
  ui[1]: "input value bit 1"
  ui[2]: "input value bit 2"
  ui[3]: "input value bit 3"
  ui[4]: "input value bit 4"
  ui[5]: "input value bit 5"
  ui[6]: "input value bit 6"
  ui[7]: "input value bit 7"

  # Outputs
  uo[0]: "BSD output chunk bit 0"
  uo[1]: "BSD output chunk bit 1"
  uo[2]: "BSD output chunk bit 2"
  uo[3]: "BSD output chunk bit 3"
  uo[4]: "BSD output chunk bit 4"
  uo[5]: "BSD output chunk bit 5"
  uo[6]: "BSD output chunk bit 6"
  uo[7]: "BSD output chunk bit 7"

  # Bidirectional pins
  uio[0]: "register select bit 0"
  uio[1]: "register select bit 1"
  uio[2]: "register select bit 2"
  uio[3]: "output chunk select bit 0"
  uio[4]: "output chunk select bit 1"
  uio[5]: ""
  uio[6]: ""
  uio[7]: "write enable"

# Do not change!
yaml_version: 6
